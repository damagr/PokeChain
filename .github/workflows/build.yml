name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

env:
  PLAYWRIGHT_BROWSERS_PATH: "${{ github.workspace }}/ms-playwright"
  APP_NAME: pokechain
  APP_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '0.0.0' }}

jobs:
  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-linux-${{ hashFiles('**/requirements.txt') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          python -m playwright install chromium
          python -m playwright install chromium-headless-shell

      - name: Build executable
        run: |
          mkdir -p build/dist build/work
          PYINSTALLER_ARGS=(
            --onedir
            --name "$APP_NAME"
            --distpath build/dist
            --workpath build/work
            --specpath build
            --add-data "${{ github.workspace }}/icono.png:."
            --hidden-import plyer.platforms.linux.notification
          )
          for dir in "$PLAYWRIGHT_BROWSERS_PATH"/chromium-*/; do
            rev=$(basename "$dir")
            PYINSTALLER_ARGS+=(--add-data "$dir:ms-playwright/$rev")
          done
          for dir in "$PLAYWRIGHT_BROWSERS_PATH"/chromium_headless_shell-*/; do
            rev=$(basename "$dir")
            PYINSTALLER_ARGS+=(--add-data "$dir:ms-playwright/$rev")
          done
          for dir in "$PLAYWRIGHT_BROWSERS_PATH"/ffmpeg-*/; do
            rev=$(basename "$dir")
            PYINSTALLER_ARGS+=(--add-data "$dir:ms-playwright/$rev")
          done
          pyinstaller "${PYINSTALLER_ARGS[@]}" pokechain.py

      - name: Debug PyInstaller output
        run: |
          echo "=== build/dist ==="
          ls -la build/dist/
          echo "=== build/dist/pokechain ==="
          ls -la build/dist/pokechain/ 2>/dev/null || echo "NO EXISTE"
          echo "=== build/work ==="
          ls -la build/work/ 2>/dev/null || echo "NO EXISTE"
          echo "=== APP_VERSION ==="
          echo "${{ env.APP_VERSION }}"

      - name: Set APP_VERSION_DEB
        id: version_deb
        run: |
          VERSION="${{ env.APP_VERSION }}"
          if [[ "$VERSION" =~ ^v ]]; then
            echo "APP_VERSION_DEB=${VERSION#v}" >> $GITHUB_OUTPUT
          else
            echo "APP_VERSION_DEB=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Package .deb
        run: |
          set -x
          # Verificar que el script existe y es ejecutable
          ls -la .github/scripts/package-deb.sh
          chmod +x .github/scripts/package-deb.sh
          # Ejecutar sin fakeroot (en CI Ubuntu no hace falta)
          .github/scripts/package-deb.sh \
            "build/dist" "$APP_NAME" "${{ steps.version_deb.outputs.APP_VERSION_DEB }}"
          # Verificar que se creó el .deb
          echo "--- Contenido de build/dist/ ---"
          ls -la build/dist/
          # Verificar que el .deb existe (usando la versión limpia para Debian)
          test -f "build/dist/pokechain_${{ steps.version_deb.outputs.APP_VERSION_DEB }}_amd64.deb" && echo "DEB creado OK" || { echo "ERROR: .deb no encontrado"; exit 1; }

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_${{ env.APP_VERSION }}_linux_amd64
          path: build/dist/*.deb

  build-windows:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-win-${{ hashFiles('**/requirements.txt') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          $env:PLAYWRIGHT_BROWSERS_PATH = "${{ env.PLAYWRIGHT_BROWSERS_PATH }}"
          python -m playwright install chromium
          python -m playwright install chromium-headless-shell

      - name: Build executable
        run: |
          $AppName = "${{ env.APP_NAME }}"
          $PlaywrightCache = "${{ env.PLAYWRIGHT_BROWSERS_PATH }}"
          $ProjectDir = "${{ github.workspace }}"
          New-Item -ItemType Directory -Force -Path "build/dist", "build/work" | Out-Null
          $pyArgs = @(
            "--onedir",
            "--name", $AppName,
            "--distpath", "build/dist",
            "--workpath", "build/work",
            "--specpath", "build",
            "--add-data", "$ProjectDir\icono.png;.",
            "--hidden-import", "plyer.platforms.win.notification",
            "--noconsole"
          )
          foreach ($pat in @("chromium-*", "chromium_headless_shell-*", "ffmpeg-*")) {
            $dirs = Get-ChildItem "$PlaywrightCache\$pat" -Directory -ErrorAction SilentlyContinue
            foreach ($bd in $dirs) {
              $rev = $bd.Name
              Write-Host "  Adding: $rev"
              $pyArgs += "--add-data"
              $pyArgs += "$($bd.FullName);ms-playwright/$rev"
            }
          }
          pyinstaller $pyArgs "pokechain.py"

      - name: Package .zip
        run: |
          $AppName = "${{ env.APP_NAME }}"
          $Version = "${{ env.APP_VERSION }}"
          $ReleaseDir = "build\dist\$AppName"
          $ArchiveFile = "build\dist\${AppName}_${Version}_win64.zip"
          if (Test-Path $ArchiveFile) { Remove-Item -Force $ArchiveFile }
          Compress-Archive -Path "$ReleaseDir\*" -DestinationPath $ArchiveFile
          Get-Item $ArchiveFile | Select-Object Name, Length

      - name: Upload .zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_${{ env.APP_VERSION }}_win64
          path: build/dist/*.zip

  publish:
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_${{ env.APP_VERSION }}_linux_amd64
          path: artifacts/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_${{ env.APP_VERSION }}_win64
          path: artifacts/win

      - name: List artifacts
        run: |
          echo "=== Linux ==="
          ls -la artifacts/linux/
          echo "=== Windows ==="
          ls -la artifacts/win/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux/*.deb
            artifacts/win/*.zip
          generate_release_notes: true
